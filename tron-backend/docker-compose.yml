version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: tron-redis
    ports:
      - "6379:6379"
    restart: always

  api:
    build: .
    container_name: tron-api
    command: node src/index.js
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

  worker:
    build: .
    container_name: tron-worker
    command: node src/worker.js
    environment:
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      - redis
    restart: always